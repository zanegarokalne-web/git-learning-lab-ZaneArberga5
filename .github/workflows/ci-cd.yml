name: Students file CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check-students-file:
    runs-on: ubuntu-latest
    steps:
      - name: Lejupieladet repozitorija kodu
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::253264393860:role/GitHub-to-S3-Role
          aws-region: us-east-1

      - name: Report Success Metric to CloudWatch
        run: |
          aws cloudwatch put-metric-data \
            --metric-name DeploySuccess \
            --namespace StudentDeployments \
            --value 1 \
            --unit Count
