name: Deploy to S3
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} --exclude ".git*" --exclude ".github*"
# Šis solis nostrādā tikai tad, ja deploy bija VEIKSMĪGS
    - name: Report Success Metric to CloudWatch
      if: success()
      run: |
        aws cloudwatch put-metric-data \
          --metric-name DeploySuccess \
          --namespace StudentDeployments \
          --value 1 \
          --unit Count

    # Šis solis nostrādā tikai tad, ja deploy NEIZDEVĀS
    - name: Report Failure Metric to CloudWatch
      if: failure()
      run: |
        aws cloudwatch put-metric-data \
          --metric-name DeployFailure \
          --namespace StudentDeployments \
          --value 1 \
          --unit Count
